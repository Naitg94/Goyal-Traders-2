<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --fg: #f5f5f7;
            --muted: #6b6b7b;
            --accent: #00d4aa;
            --accent-glow: rgba(0, 212, 170, 0.4);
            --card: #16161f;
            --card-border: rgba(255, 255, 255, 0.06);
            --whatsapp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .font-display { font-family: 'Space Grotesk', sans-serif; }

        /* Background Effects */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 212, 170, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(99, 102, 241, 0.08), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 { width: 400px; height: 400px; background: rgba(0, 212, 170, 0.12); top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(99, 102, 241, 0.1); bottom: -50px; left: -50px; animation-delay: -10s; }

        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -30px) scale(1.05); } }

        /* Main Layout */
        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Card */
        .confirmation-card {
            background: linear-gradient(135deg, var(--card) 0%, rgba(22, 22, 31, 0.8) 100%);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 100px -20px var(--accent-glow);
            opacity: 0;
            transform: translateY(30px);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        @keyframes cardEntrance { to { opacity: 1; transform: translateY(0); } }

        /* Success Icon */
        .success-icon-wrapper { position: relative; width: 90px; height: 90px; margin: 0 auto 2rem; }
        .success-ring {
            position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--accent); opacity: 0;
            animation: ringPulse 2s ease-out 0.8s infinite;
        }
        .success-ring:nth-child(2) { animation-delay: 1s; }
        
        @keyframes ringPulse { 0% { opacity: 0.6; transform: scale(1); } 100% { opacity: 0; transform: scale(2); } }

        .success-circle {
            width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, var(--accent) 0%, #00a88a 100%);
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px var(--accent-glow);
            opacity: 0; transform: scale(0); animation: circlePop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
        }
        
        @keyframes circlePop { to { opacity: 1; transform: scale(1); } }

        .checkmark { width: 40px; height: 40px; stroke: var(--bg); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        .checkmark-path { stroke-dasharray: 60; stroke-dashoffset: 60; animation: drawCheck 0.5s ease-out 0.9s forwards; }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }

        /* Typography */
        .title { font-size: 1.9rem; font-weight: 700; margin-bottom: 0.5rem; opacity: 0; animation: slideUp 0.6s ease-out 1s forwards; }
        .subtitle { color: var(--muted); margin-bottom: 2rem; opacity: 0; animation: slideUp 0.6s ease-out 1.1s forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Order Box */
        .order-box {
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--card-border); border-radius: 16px; padding: 1.5rem;
            margin-bottom: 2rem; opacity: 0; animation: slideUp 0.6s ease-out 1.2s forwards;
        }

        .order-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;
            padding-bottom: 1rem; border-bottom: 1px solid var(--card-border);
        }

        .order-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
        .order-id { font-family: 'Space Grotesk'; font-size: 0.85rem; color: var(--accent); background: rgba(0, 212, 170, 0.1); padding: 0.3rem 0.6rem; border-radius: 6px; }

        .order-items { display: flex; flex-direction: column; gap: 1rem; max-height: 220px; overflow-y: auto; padding-right: 5px; }
        .order-items::-webkit-scrollbar { width: 4px; }
        .order-items::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 10px; }

        .item-row { display: flex; align-items: center; gap: 1rem; }
        .item-img { width: 45px; height: 45px; border-radius: 8px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .item-img img { width: 100%; height: 100%; object-fit: cover; }
        .item-info { flex: 1; }
        .item-name { font-weight: 500; font-size: 0.95rem; margin-bottom: 0.1rem; }
        .item-meta { font-size: 0.8rem; color: var(--muted); }
        .item-price { font-family: 'Space Grotesk'; font-weight: 600; font-size: 0.9rem; }

        .divider { height: 1px; background: var(--card-border); margin: 1rem 0; }
        .total-row { display: flex; justify-content: space-between; align-items: center; }
        .total-label { font-weight: 500; color: var(--muted); }
        .total-price { font-family: 'Space Grotesk'; font-size: 1.2rem; font-weight: 700; color: var(--fg); }

        .empty-state { text-align: center; color: var(--muted); padding: 1rem; font-size: 0.9rem; }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 0.75rem; opacity: 0; animation: slideUp 0.6s ease-out 1.3s forwards; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.9rem 1.5rem;
            border-radius: 12px; font-family: 'Outfit'; font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; border: none; text-decoration: none;
        }
        
        .btn-whatsapp { background: var(--whatsapp); color: white; box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3); }
        .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(37, 211, 102, 0.4); }

        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: var(--fg); border: 1px solid var(--card-border); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

        /* Confetti */
        #confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

        /* Responsive */
        @media (max-width: 480px) {
            .confirmation-card { padding: 2rem 1.5rem; }
            .title { font-size: 1.6rem; }
            .success-icon-wrapper { width: 70px; height: 70px; }
            .success-circle { width: 70px; height: 70px; }
            .checkmark { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div id="confetti-container"></div>

    <main class="main-container">
        <div class="confirmation-card">
            <!-- Success Icon -->
            <div class="success-icon-wrapper">
                <div class="success-ring"></div>
                <div class="success-ring"></div>
                <div class="success-circle">
                    <svg class="checkmark" viewBox="0 0 44 44">
                        <path class="checkmark-path" d="M10 22L18 30L34 14"></path>
                    </svg>
                </div>
            </div>

            <!-- Header -->
            <h1 class="title font-display">Order Confirmed</h1>
            <p class="subtitle">Thank you for your purchase. Your order has been placed successfully.</p>

            <!-- Order Details -->
            <div class="order-box">
                <div class="order-header">
                    <span class="order-label">Order Summary</span>
                    <span class="order-id" id="order-id-display">#ORD-00000</span>
                </div>
                
                <div class="order-items" id="order-items-container">
                    <!-- Items will be loaded here from the Cart -->
                </div>

                <div class="divider"></div>
                <div class="total-row">
                    <span class="total-label">Total Paid</span>
                    <span class="total-price" id="total-price-display">$0.00</span>
                </div>
            </div>

            <!-- Actions -->
            <div class="btn-group">
                <button class="btn btn-whatsapp" onclick="sendToWhatsApp()" aria-label="Send order to WhatsApp">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    Order via WhatsApp
                </button>
                <button class="btn btn-secondary" onclick="continueShopping()">
                    Continue Shopping
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        // Enter your WhatsApp number here (Without + or 00)
        const WHATSAPP_NUMBER = "1234567890"; 

        // --- CORE LOGIC ---
        
        // 1. Get items from LocalStorage (Cart)
        function getCartItems() {
            const items = localStorage.getItem('cart');
            if (items) {
                try {
                    return JSON.parse(items);
                } catch (e) {
                    console.error("Error parsing cart:", e);
                    return [];
                }
            }
            return [];
        }

        // 2. Render Order Details
        function renderOrder() {
            const items = getCartItems();
            const container = document.getElementById('order-items-container');
            const totalDisplay = document.getElementById('total-price-display');
            const orderIdDisplay = document.getElementById('order-id-display');

            // Generate random Order ID
            const randomId = 'ORD-' + Math.floor(Math.random() * 90000 + 10000);
            orderIdDisplay.textContent = '#' + randomId;

            let html = '';
            let total = 0;

            if (items.length === 0) {
                html = '<div class="empty-state">No items found in cart.</div>';
            } else {
                items.forEach(item => {
                    const itemTotal = item.price * item.qty;
                    total += itemTotal;
                    
                    // Use placeholder if no image provided
                    const imgSrc = item.image || 'https://placehold.co/100x100/16161f/00d4aa?text=Item';

                    html += `
                        <div class="item-row">
                            <div class="item-img">
                                <img src="${imgSrc}" alt="${item.name}">
                            </div>
                            <div class="item-info">
                                <div class="item-name">${item.name}</div>
                                <div class="item-meta">Qty: ${item.qty}</div>
                            </div>
                            <div class="item-price">₹${itemTotal.toFixed(2)}</div>
                        </div>
                    `;
                });
            }

            container.innerHTML = html;
            totalDisplay.textContent = `₹${total.toFixed(2)}`;
        }

        // 3. Send to WhatsApp with Item Details
        function sendToWhatsApp() {
            const items = getCartItems();
            const orderId = document.getElementById('order-id-display').textContent;
            const total = document.getElementById('total-price-display').textContent;

            // Build Message
            let message = `*New Order ${orderId}*\n\n`;
            message += `*Customer Details:*\nName: [Customer Name]\nAddress: [Customer Address]\n\n`; // Placeholder
            message += `*Order Items:*\n`;

            if (items.length > 0) {
                items.forEach(item => {
                    message += `- ${item.name} (x${item.qty}) : $${(item.price * item.qty).toFixed(2)}\n`;
                });
            } else {
                message += `- No items\n`;
            }

            message += `\n*Total Amount: ${total}*\n`;
            message += `\nThank you!`;

            // Open WhatsApp
            const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }

        function continueShopping() {
            // Clear cart after confirmation (optional standard practice)
            // localStorage.removeItem('cart'); 
            window.location.href = 'shopping.html';
        }

        // --- VISUAL EFFECTS (Confetti) ---
        function triggerConfetti() {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            const container = document.getElementById('confetti-container');
            const colors = ['#00d4aa', '#fbbf24', '#6366f1'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const conf = document.createElement('div');
                    const size = Math.random() * 10 + 5;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    
                    conf.style.cssText = `
                        position: absolute; width: ${size}px; height: ${size}px; 
                        background: ${color}; left: ${Math.random() * 100}%; top: -20px;
                        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'}; opacity: 0;
                    `;
                    container.appendChild(conf);

                    conf.animate([
                        { opacity: 1, transform: 'translateY(0) rotate(0deg)' },
                        { opacity: 0, transform: `translateY(${window.innerHeight}px) rotate(360deg)` }
                    ], {
                        duration: Math.random() * 2000 + 2000,
                        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                    }).onfinish = () => conf.remove();
                }, i * 40);
            }
        }

        // Initialize
        window.onload = () => {
            renderOrder();
            triggerConfetti();
            // Clear the cart only after the order details are rendered
            localStorage.removeItem('cart'); 
        };
    </script>
</body>
</html>
